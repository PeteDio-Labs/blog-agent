name: Build and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.toastedbytes.com
  IMAGE_NAME: blog-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          echo "//registry.toastedbytes.com/repository/npm-group/:_auth=${{ secrets.NEXUS_NPM_TOKEN }}" >> .npmrc
          bun install --frozen-lockfile
          sed -i '/_auth=/d' .npmrc

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Nexus Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Set image tag
        if: github.event_name == 'push'
        id: tag
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHA=${GITHUB_SHA::7}
          echo "tag=${BRANCH}-${SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=${BRANCH}-latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          secrets: |
            npmrc_auth=//registry.toastedbytes.com/repository/npm-group/:_auth=${{ secrets.NEXUS_NPM_TOKEN }}

      - name: Summary
        if: github.event_name == 'push'
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.latest_tag }}\`" >> $GITHUB_STEP_SUMMARY
